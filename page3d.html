<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客户账户全程数据 · 慢动作演示（2024.10.10 — 10.16）</title>
<style>
:root{
  --paper:#f7f2e6;        /* 宣纸 */
  --paper-line:#e3d9c2;   /* 账本横线 */
  --ink:#211d18;          /* 墨 */
  --muted:#6f6553;
  --cinnabar:#b5301f;     /* 朱砂（动手脚/指纹） */
  --cinnabar-bg:#fbe9e5;
  --jade:#1b6e4a;         /* 翠（勾稽相符/入账） */
  --jade-bg:#e7f3ec;
  --amber:#9a6200;
  --amber-bg:#fdf3da;
  --navy:#2c4763;         /* 章节靛青 */
  --line:#d8cdb4;
  --serif:"Noto Serif SC","Songti SC","STSong","SimSun",serif;
  --sans:"Noto Sans SC","PingFang SC","Microsoft YaHei","Heiti SC",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:20px}
body{
  font-family:var(--sans);color:var(--ink);
  background:
    repeating-linear-gradient(180deg, transparent 0 46px, var(--paper-line) 46px 47px),
    radial-gradient(1200px 600px at 50% -10%, #fffdf6, transparent 60%),
    var(--paper);
  min-height:100vh;
}
.wrap{max-width:1080px;margin:0 auto;padding:22px 18px 150px}

/* ===== 头部 ===== */
header{text-align:center;padding:6px 0 14px;border-bottom:3px double var(--ink)}
.kicker{font-size:.82rem;letter-spacing:.18em;color:var(--cinnabar);font-weight:700}
h1{font-family:var(--serif);font-weight:900;font-size:clamp(28px,4.6vw,46px);letter-spacing:.06em;margin:.25em 0 .15em}
.sub{font-size:clamp(15px,2.2vw,21px);color:var(--muted);letter-spacing:.12em}

/* ===== 章节条 ===== */
nav#chapters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0 14px}
nav#chapters button{
  font-family:var(--serif);font-weight:700;font-size:.92rem;letter-spacing:.06em;
  border:1.5px solid var(--navy);color:var(--navy);background:transparent;
  border-radius:999px;padding:.42em 1em;cursor:pointer;
}
nav#chapters button.on{background:var(--navy);color:#fdfaf2}

/* ===== 舞台 ===== */
.stage{
  background:#fffdf6;border:1.5px solid var(--line);border-radius:14px;
  box-shadow:0 10px 30px rgba(60,45,20,.10);
  padding:clamp(16px,3vw,30px);
  border-top:6px solid var(--navy);
  transition:border-color .6s;
}
.stage.tone-warn{border-top-color:var(--cinnabar);box-shadow:0 10px 34px rgba(181,48,31,.18)}
.stage.tone-good{border-top-color:var(--jade);box-shadow:0 10px 34px rgba(27,110,74,.16)}

.stephead{display:flex;flex-direction:column;gap:8px;align-items:center;text-align:center;margin-bottom:14px}
.time{
  font-weight:900;font-size:clamp(22px,3.6vw,34px);letter-spacing:.08em;
  font-variant-numeric:tabular-nums;color:var(--navy);
}
.stage.tone-warn .time{color:var(--cinnabar)}
.stage.tone-good .time{color:var(--jade)}
.badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:1.4em}
.badge{font-size:.86rem;font-weight:800;border-radius:8px;padding:.28em .7em;letter-spacing:.04em}
.badge.warn{background:var(--cinnabar);color:#fff}
.badge.fp{border:2px solid var(--cinnabar);color:var(--cinnabar);background:var(--cinnabar-bg)}
.badge.good{background:var(--jade);color:#fff}
.badge.ver{border:2px solid var(--jade);color:var(--jade);background:var(--jade-bg)}
.title{font-family:var(--serif);font-weight:900;font-size:clamp(24px,4vw,38px);letter-spacing:.04em}

/* ===== 双账格 ===== */
.dash{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin:10px 0 14px}
.tile{
  border:1.5px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fffef9,#fbf6e9);
  padding:14px 16px;text-align:center;position:relative;overflow:hidden;
}
.tlabel{font-size:clamp(15px,2vw,19px);font-weight:700;color:var(--muted);letter-spacing:.06em;min-height:1.5em}
.tnum{
  font-weight:900;font-variant-numeric:tabular-nums;white-space:nowrap;
  font-size:clamp(40px,7.4vw,84px);line-height:1.15;letter-spacing:.01em;margin:.04em 0;
  transition:color .4s;
}
.tnum.long{font-size:clamp(32px,6vw,66px)}
.tnum.neg{color:var(--cinnabar)}
.tnum.pos{color:var(--jade)}
.tnum.struck{text-decoration:line-through;text-decoration-color:var(--cinnabar);text-decoration-thickness:5px;opacity:.55}
.tnum2{font-weight:900;font-variant-numeric:tabular-nums;font-size:clamp(34px,5.6vw,64px);line-height:1.2}
.tdelta{min-height:1.5em;font-size:clamp(15px,2.1vw,20px);font-weight:800;letter-spacing:.02em}
.tdelta.down{color:var(--cinnabar)} .tdelta.up{color:var(--jade)} .tdelta.note{color:var(--amber)}
.tnote{font-size:.82rem;color:var(--muted);min-height:1.3em;margin-top:2px}
.holdings{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px;min-height:1.6em}
.chip{font-size:.82rem;font-weight:700;border:1.5px solid var(--line);border-radius:999px;padding:.2em .65em;background:#fff;color:var(--muted);font-variant-numeric:tabular-nums}

/* ===== 事件卡区 ===== */
.cardzone{margin:8px 0 14px;min-height:40px}
.card{border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:16px 18px;animation:rise .8s both}
.card.warn{border-color:var(--cinnabar);background:var(--cinnabar-bg)}
.card.good{border-color:var(--jade);background:var(--jade-bg)}
.card.amber{border-color:var(--amber);background:var(--amber-bg)}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* 表格 */
table.tb{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;font-size:clamp(15px,2vw,19px)}
table.tb th,table.tb td{padding:.42em .5em;border-bottom:1px solid var(--paper-line);text-align:right}
table.tb th:first-child,table.tb td:first-child{text-align:left}
table.tb tr.total td{border-top:2.5px solid var(--ink);border-bottom:none;font-weight:900}
table.tb tr.now td{background:var(--amber-bg);font-weight:900}
table.tb td.neg{color:var(--cinnabar);font-weight:700}
.tb-cap{font-weight:800;font-size:.95rem;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}

/* 当前买入卡 */
.buy-now{display:flex;flex-wrap:wrap;align-items:baseline;gap:.5em .9em;font-size:clamp(18px,2.8vw,26px);font-weight:800;margin-bottom:10px}
.buy-now .bi{font-family:var(--serif);font-size:1.5em;color:var(--navy)}
.buy-now .ba{margin-left:auto;color:var(--cinnabar);font-variant-numeric:tabular-nums}
.buy-now i{font-style:normal;color:var(--muted);font-size:.78em;font-weight:700}

/* 算式 */
.eq{display:flex;flex-wrap:wrap;align-items:stretch;justify-content:center;gap:10px;margin:6px 0}
.eq .term{
  border:2px solid var(--line);border-radius:10px;background:#fffdf6;padding:.5em .8em;text-align:center;
  opacity:0;animation:rise .8s both;animation-delay:calc(var(--i)*.55s);
}
.eq .term b{display:block;font-size:clamp(20px,3.4vw,32px);font-variant-numeric:tabular-nums;letter-spacing:.01em}
.eq .term i{display:block;font-style:normal;font-size:.82rem;color:var(--muted);font-weight:700;margin-top:2px}
.eq .term.red{border-color:var(--cinnabar)} .eq .term.red b{color:var(--cinnabar)}
.eq .term.green{border-color:var(--jade)} .eq .term.green b{color:var(--jade)}
.eq .op{align-self:center;font-size:clamp(24px,4vw,38px);font-weight:900;color:var(--muted);opacity:0;animation:rise .8s both;animation-delay:calc(var(--i)*.55s)}
.eqnote{text-align:center;font-size:clamp(15px,2vw,19px);color:var(--muted);font-weight:700;margin-top:6px}

/* 印章 */
.sealrow{text-align:center;margin-top:12px}
.seal{
  display:inline-block;font-family:var(--serif);font-weight:900;letter-spacing:.08em;
  font-size:clamp(20px,3vw,30px);color:var(--jade);
  border:3.5px solid var(--jade);border-radius:12px;padding:.22em .7em;
  transform:rotate(-5deg);background:rgba(231,243,236,.6);
  box-shadow:0 0 0 2px rgba(27,110,74,.12) inset;
  animation:stamp .9s cubic-bezier(.2,1.4,.4,1) both;animation-delay:2.2s;
}
.seal.red{color:var(--cinnabar);border-color:var(--cinnabar);background:rgba(251,233,229,.6);box-shadow:0 0 0 2px rgba(181,48,31,.12) inset}
@keyframes stamp{0%{opacity:0;transform:rotate(-5deg) scale(2.1)}60%{opacity:1;transform:rotate(-5deg) scale(.94)}100%{opacity:1;transform:rotate(-5deg) scale(1)}}

/* 指纹四宫格 / 终局 */
.fp4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fp{border:2px solid var(--cinnabar);background:#fff;border-radius:10px;padding:10px 12px;font-weight:800;font-size:clamp(15px,2.1vw,19px)}
.fp b{display:block;color:var(--cinnabar);font-family:var(--serif);letter-spacing:.06em;margin-bottom:2px}
.fp span{display:block;font-weight:600;color:var(--muted);font-size:.85em;margin-top:3px;font-variant-numeric:tabular-nums}
.finline{font-size:clamp(16px,2.3vw,21px);font-weight:800;text-align:center;margin-top:8px;font-variant-numeric:tabular-nums}
.finline.red{color:var(--cinnabar)}

/* 序章章节单 */
.chap-list{display:grid;gap:8px;font-size:clamp(16px,2.3vw,21px);font-weight:700}
.chap-list div{border-left:5px solid var(--navy);padding:.3em .7em;background:#fffdf6}
.chap-list b{font-family:var(--serif);color:var(--navy);margin-right:.6em}

/* 删痕 */
.delrows{display:grid;gap:8px;font-variant-numeric:tabular-nums;font-weight:800;font-size:clamp(17px,2.5vw,23px)}
.delrows div{position:relative;padding:.3em .2em;color:var(--muted)}
.delrows div::after{content:"";position:absolute;left:0;right:0;top:50%;height:4px;background:var(--cinnabar);transform:scaleX(0);transform-origin:left;animation:strike 1.2s ease forwards}
.delrows div:nth-child(2)::after{animation-delay:.7s}
@keyframes strike{to{transform:scaleX(1)}}

/* 解说 */
.narr{
  font-size:clamp(19px,2.7vw,26px);line-height:1.8;letter-spacing:.02em;
  background:linear-gradient(180deg,#fffef9,#fcf7ea);
  border:1.5px solid var(--line);border-left:6px solid var(--navy);
  border-radius:12px;padding:16px 20px;min-height:5.4em;
}
.stage.tone-warn .narr{border-left-color:var(--cinnabar)}
.stage.tone-good .narr{border-left-color:var(--jade)}
.narr b{color:var(--cinnabar)} .narr em{font-style:normal;color:var(--jade);font-weight:800}
.narr u{text-decoration:none;background:linear-gradient(transparent 62%, #f6dfae 62%);font-weight:800}

/* ===== 控制台（固定底部） ===== */
.ctrl{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:rgba(33,29,24,.96);color:#f4eddc;backdrop-filter:blur(4px);
  padding:10px 14px 12px;box-shadow:0 -8px 26px rgba(0,0,0,.25);
}
.ctrl .inner{max-width:1080px;margin:0 auto;display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.ctrl button{
  font-family:var(--sans);font-weight:900;font-size:clamp(17px,2.4vw,22px);
  border:2px solid #f4eddc;background:transparent;color:#f4eddc;
  border-radius:12px;padding:.5em 1.1em;cursor:pointer;min-height:54px;
}
.ctrl button.primary{background:var(--cinnabar);border-color:var(--cinnabar);min-width:9.5em}
.ctrl button:disabled{opacity:.35;cursor:default}
.ctrl .meta{font-size:.95rem;gap:14px}
.speed button{min-height:42px;padding:.25em .8em;font-size:1rem}
.speed button.on{background:#f4eddc;color:var(--ink)}
.count{font-variant-numeric:tabular-nums;font-weight:800;letter-spacing:.05em}
.bar{height:8px;border-radius:99px;background:rgba(244,237,220,.22);overflow:hidden}
#barFill{height:100%;width:0;background:linear-gradient(90deg,var(--jade),#8fd6b4);transition:width .8s}

/* 资料来源 */
.source{margin-top:18px;text-align:center;font-size:.85rem;color:var(--muted);line-height:1.7}

@media (max-width:720px){
  html{font-size:18px}
  .dash{grid-template-columns:1fr}
  .fp4{grid-template-columns:1fr}
  .wrap{padding-bottom:190px}
}
@media (prefers-reduced-motion: reduce){
  .card,.eq .term,.eq .op{animation:none;opacity:1}
  .seal{animation:none;opacity:1}
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="kicker">全部数据出自国泰海通自认材料与官方交割单 · 算术逐项闭合 · 差额 ¥0.00</div>
    <h1>客户账户全程数据 · 慢动作演示</h1>
    <div class="sub">2024年10月10日 委托卖出 ──→ 10月16日 交割结算终局</div>
  </header>

  <nav id="chapters"></nav>

  <main class="stage" id="stage">
    <div class="stephead">
      <div class="time" id="stTime"></div>
      <div class="badges" id="stBadges"></div>
      <h2 class="title" id="stTitle"></h2>
    </div>

    <section class="dash">
      <div class="tile">
        <div class="tlabel" id="cashLabel">账户现金</div>
        <div class="tnum" id="cashNum">——</div>
        <div class="tdelta" id="cashDelta"></div>
        <div class="tnote" id="cashNote"></div>
      </div>
      <div class="tile">
        <div class="tlabel">国泰君安Ｈ股（02611）持股</div>
        <div class="tnum2" id="shareNum">——</div>
        <div class="tdelta" id="shareDelta"></div>
        <div class="holdings" id="holdings"></div>
      </div>
    </section>

    <section class="cardzone" id="cardzone"></section>

    <section class="narr" id="narr"></section>
  </main>

  <div class="source">
    数据出处：国泰海通《代理意见》（2025-05-26 庭审）与《起诉状》之书面司法自认 · 官方交割单 · 账户截图（图6 / 图24 / 图25）。<br>
    本演示仅作数据呈现，全部数字可逐项核对，无一出自我方臆测。
  </div>
</div>

<footer class="ctrl">
  <div class="inner">
    <div class="row">
      <button id="btnPrev">⏮ 上一步</button>
      <button id="btnPlay" class="primary">▶ 开始播放</button>
      <button id="btnNext">下一步 ⏭</button>
    </div>
    <div class="row meta">
      <span class="speed">速度
        <button data-s="ultra" class="on">超慢·每秒一变</button><button data-s="1">慢速</button><button data-s="0.55">中速</button>
      </span>
      <span class="count" id="stepCount"></span>
      <button id="btnRestart" style="min-height:42px;padding:.25em .8em;font-size:1rem">⟲ 重播</button>
      <button id="btnFull" style="min-height:42px;padding:.25em .8em;font-size:1rem">⛶ 全屏</button>
    </div>
    <div class="bar"><div id="barFill"></div></div>
  </div>
</footer>

<script>
"use strict";
/* ---------- 工具 ---------- */
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;
const F = (v, d=2, c='¥') => (v<0?'−':'') + c + Math.abs(v).toLocaleString('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d});
const $ = id => document.getElementById(id);

function tween(el, from, to, dur, render){
  if (el._raf) cancelAnimationFrame(el._raf);
  if (RM || dur<=0 || from===to){ el.textContent = render(to); return; }
  const t0 = performance.now();
  const stepMode = ULTRA && dur > 1500;            /* 超慢：数字整秒跳变 */
  const fr = t => {
    let p = Math.min(1, (t - t0) / dur);
    let v;
    if (stepMode){
      p = Math.min(1, Math.floor((t - t0) / 1000) * 1000 / dur);   /* 每满 1 秒变一次 */
      v = from + (to - from) * p;                                   /* 等额递进，便于逐秒跟读 */
    } else {
      const e = p<.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;
      v = from + (to - from) * e;
    }
    el.textContent = render(v);
    if (p < 1) el._raf = requestAnimationFrame(fr);
  };
  el._raf = requestAnimationFrame(fr);
}

/* ---------- 数据 ---------- */
const BUYS = [
  {i:'①', name:'国泰君安', code:'02611', qty:'92,800', px:'14.999', amt:1269444.44, rem:-1269345.80},
  {i:'②', name:'中信证券', code:'06030', qty:'48,000', px:'21.800', amt:954313.06,  rem:-2223658.86},
  {i:'③', name:'中信证券', code:'06030', qty:'72,500', px:'21.884', amt:1446956.30, rem:-3670615.16},
  {i:'④', name:'中信证券', code:'06030', qty:'36,500', px:'21.697', amt:722261.22,  rem:-4392876.38},
  {i:'⑤', name:'玖龙纸业', code:'02689', qty:'115,000', px:'3.510', amt:368136.17,  rem:-4761012.55},
  {i:'⑥', name:'东阳光药', code:'01558', qty:'22,400', px:'9.070', amt:185337.50,  rem:-4946350.05},
  {i:'⑦', name:'东阳光药', code:'01558', qty:'22,600', px:'9.070', amt:186995.42,  rem:-5133345.47},
];
const HOLD = [
  [], [['中信证券',48000]], [['中信证券',120500]], [['中信证券',157000]],
  [['中信证券',157000],['玖龙纸业',115000]],
  [['中信证券',157000],['玖龙纸业',115000],['东阳光药',22400]],
  [['中信证券',157000],['玖龙纸业',115000],['东阳光药',45000]],
];

function buyCard(bi){
  const b = BUYS[bi];
  let rows = '';
  for (let k=0; k<=bi; k++){
    const r = BUYS[k];
    rows += `<tr class="${k===bi?'now':''}"><td>${r.i} ${r.name}</td><td>${r.qty} 股</td><td class="neg">−${F(r.amt,2,'')}</td><td class="neg">${F(r.rem)}</td></tr>`;
  }
  let total = '';
  if (bi===BUYS.length-1) total = `<tr class="total"><td>七笔合计</td><td></td><td class="neg">−5,133,444.11</td><td class="neg">−¥5,133,345.47</td></tr>`;
  return `<div class="card">
    <div class="buy-now"><span class="bi">${b.i}</span><span class="bn">${b.name} <i>(${b.code})</i></span><span>${b.qty} 股 × HK$${b.px}</span><span class="ba">−¥${F(b.amt,2,'')}</span></div>
    <div class="tb-cap">官方交割单 · 逐笔轧减（剩余金额自 ¥98.64 起）</div>
    <table class="tb"><tr><th>买入</th><th>数量</th><th>发生金额(¥)</th><th>剩余金额</th></tr>${rows}${total}</table>
  </div>`;
}

function eq(parts, note, seal, sealRed){
  let i = 0;
  const html = parts.map(p => p.op
    ? `<span class="op" style="--i:${i++}">${p.op}</span>`
    : `<span class="term ${p.cls||''}" style="--i:${i++}"><b>${p.n}</b><i>${p.s||''}</i></span>`
  ).join('');
  return `<div class="card"><div class="eq">${html}</div>${note?`<div class="eqnote">${note}</div>`:''}${seal?`<div class="sealrow"><span class="seal ${sealRed?'red':''}">${seal}</span></div>`:''}</div>`;
}

/* ---------- 步骤 ---------- */
const STEPS = [
/*0 序章*/
{ ch:0, t:'2024年10月10日 — 10月16日', title:'开演之前 · 五章看全', tone:'normal',
  cash:null, sh:null,
  card:`<div class="card"><div class="chap-list">
    <div><b>第一章</b>钱从哪来 · 委托卖出与回款入账</div>
    <div><b>第二章</b>钱到哪去 · 暗中回购 ＋ 七笔买入</div>
    <div><b>第三章</b>深夜改账 · 两次扣款与删除记录</div>
    <div><b>第四章</b>交割终局 · 账户由负转正</div>

/* ---------- 章节 ---------- */
const CH = [['序幕',0],['一 · 钱从哪来',1],['二 · 钱到哪去',9],['三 · 深夜改账',17],['四 · 交割终局',20],['五 · 勾稽闭环',23]];

/* ---------- 引擎 ---------- */
let idx = 0, playing = false, spd = 1, ULTRA = true, tm = null;   /* 默认超慢：数字每 1 秒跳变一次 */
let lastCash = null, lastShare = null;
const UTICKS = 8;                                  /* 超慢模式：共 8 次跳变，每次间隔 1 秒 */
const TW = () => RM ? 0 : (ULTRA ? UTICKS * 1000 : Math.round(3200 * spd));

const chaptersEl = $('chapters');
CH.forEach(([name, start], i) => {
  const b = document.createElement('button');
  b.textContent = name;
  b.onclick = () => { goto(start); };
  chaptersEl.appendChild(b);
});

function chapterOf(i){ let c = 0; CH.forEach(([_, s], k) => { if (i >= s) c = k; }); return c; }

function show(i, fast){
  idx = Math.max(0, Math.min(STEPS.length - 1, i));
  const s = STEPS[idx];
  $('stage').className = 'stage tone-' + (s.tone || 'normal');
  $('stTime').textContent = s.t || '';
  $('stTitle').innerHTML = s.title || '';
  $('stBadges').innerHTML = (s.badges || []).map(b => `<span class="badge ${b.k}">${b.t}</span>`).join('');

  /* 主数据格 */
  const c = s.cash, cn = $('cashNum');
  if (c){
    const dec = (c.dec === undefined) ? 2 : c.dec;
    const cur = (c.cur === undefined) ? '¥' : c.cur;
    $('cashLabel').textContent = c.label || '';
    const sameReg = lastCash && lastCash.cur === cur && lastCash.dec === dec;
    let from = (c.from !== undefined) ? c.from : (sameReg ? lastCash.v : 0);
    if (fast) from = c.v;
    const txt = F(c.v, dec, cur);
    cn.classList.toggle('long', txt.length > 11);
    cn.classList.toggle('neg', c.v < 0);
    cn.classList.toggle('pos', !!c.dk && c.dk === 'up' && c.v > 0);
    cn.classList.toggle('struck', !!c.struck);
    tween(cn, from, c.v, fast ? 700 : TW(), v => F(v, dec, cur));
    lastCash = {v: c.v, cur, dec};
    $('cashDelta').innerHTML = c.delta || '';
    $('cashDelta').className = 'tdelta ' + (c.dk || '');
    $('cashNote').textContent = c.note || '';
  } else {
    cn.className = 'tnum'; cn.textContent = '——';
    $('cashLabel').textContent = '账户现金'; $('cashDelta').innerHTML = ''; $('cashNote').textContent = '';
    lastCash = null;
  }

  /* 持股格 */
  const sh = s.sh, sn = $('shareNum');
  if (sh){
    let from = (lastShare === null) ? 0 : lastShare;
    if (fast) from = sh.v;
    tween(sn, from, sh.v, fast ? 700 : TW(), v => Math.round(v).toLocaleString('zh-CN') + ' 股');
    lastShare = sh.v;
    $('shareDelta').innerHTML = sh.delta || '';
    $('shareDelta').className = 'tdelta ' + (sh.dk || '');
  } else { sn.textContent = '——'; $('shareDelta').innerHTML = ''; lastShare = null; }
  $('holdings').innerHTML = (s.hold === undefined ? [] : HOLD[s.hold])
    .map(h => `<span class="chip">${h[0]} ${h[1].toLocaleString('zh-CN')} 股</span>`).join('');

  $('cardzone').innerHTML = s.card || '';
  $('narr').innerHTML = s.narr || '';
  $('stepCount').textContent = `第 ${idx + 1} 步 ／ 共 ${STEPS.length} 步`;
  $('barFill').style.width = (idx / (STEPS.length - 1) * 100) + '%';
  const cc = chapterOf(idx);
  [...chaptersEl.children].forEach((b, k) => b.classList.toggle('on', k === cc));
  $('btnPrev').disabled = (idx === 0);
  $('btnNext').disabled = (idx === STEPS.length - 1);
}

function dwellOf(s){
  const plain = (s.narr || '').replace(/<[^>]+>/g, '');
  return (s.dwell || (5500 + plain.length * 45)) * spd;
}

function schedule(){
  clearTimeout(tm);
  if (!playing) return;
  const s = STEPS[idx];
  tm = setTimeout(() => {
    if (idx < STEPS.length - 1){ show(idx + 1); schedule(); }
    else { playing = false; updPlay(true); }
  }, TW() + dwellOf(s));
}

function updPlay(ended){
  const b = $('btnPlay');
  if (playing) b.textContent = '⏸ 暂停';
  else if (ended || idx === STEPS.length - 1) b.textContent = '▶ 从头重播';
  else if (idx === 0) b.textContent = '▶ 开始播放';
  else b.textContent = '▶ 继续播放';
}

$('btnPlay').onclick = () => {
  if (playing){ playing = false; clearTimeout(tm); }
  else {
    if (idx === STEPS.length - 1){ show(0); }
    playing = true; schedule();
  }
  updPlay();
};
$('btnPrev').onclick = () => goto(idx - 1);
$('btnNext').onclick = () => goto(idx + 1);
$('btnRestart').onclick = () => { show(0); if (playing) schedule(); updPlay(); window.scrollTo({top:0, behavior:'smooth'}); };
$('btnFull').onclick = () => {
  if (document.fullscreenElement) document.exitFullscreen();
  else if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
};
function goto(i){ clearTimeout(tm); show(i, true); if (playing) schedule(); updPlay(); }

document.querySelectorAll('.speed button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.speed button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    ULTRA = (b.dataset.s === 'ultra');
    spd = ULTRA ? 1 : parseFloat(b.dataset.s);
    if (playing) schedule();
  };
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') goto(idx + 1);
  else if (e.key === 'ArrowLeft') goto(idx - 1);
  else if (e.key === ' '){ e.preventDefault(); $('btnPlay').onclick(); }
});

show(0);
updPlay();
</script>
